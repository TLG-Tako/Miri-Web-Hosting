<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miri Stats</title>
<script src="site.js"></script>
<link rel="stylesheet" href="shared.css">
<style>
.status{
text-align:center;
margin-bottom:18px;
padding:14px;
border-radius:12px;
font-size:16px;
font-weight:700;
}
.online{
background:#e9fff5;
color:#15603f;
border:1px solid #b2ebcf;
}
.offline{
background:#fff0f3;
color:#872847;
border:1px solid #f6c4d1;
}
.state-item .label{
display:block;
font-size:12px;
text-transform:uppercase;
letter-spacing:.08em;
color:var(--muted);
margin-bottom:6px;
font-weight:700;
}
.state-item .value{
font-size:15px;
font-weight:700;
line-height:1.35;
}
.wide{grid-column:1/-1;}
</style>
</head>
<body>
<div class="container">
  <nav class="top-nav">
    <div class="nav-links">
      <a href="/">About</a>
      <a href="/chat.html">Chat</a>
      <a href="/stats.html">Stats</a>
      <a href="/settings.html">Settings</a>
      <a href="/customization.html">Customization</a>
      <a href="/creator.html" data-creator-only>Creator</a>
    </div>
    <div class="identity-row">
      <span data-identity></span>
      <button type="button" data-login-btn>Login</button>
      <button type="button" data-logout-btn>Logout</button>
    </div>
  </nav>

  <main>
    <h1>Miri Stats</h1>
    <p class="muted">Status, mood, thoughts, and diagnostics live here now.</p>
    <div id="status" class="status offline">Checking status...</div>

    <section class="card">
      <div class="grid">
        <div class="field state-item">
          <span class="label">Mood</span>
          <div id="mood" class="value">Loading...</div>
        </div>
        <div class="field state-item">
          <span class="label">Emotions</span>
          <div id="emotions" class="value">Loading...</div>
        </div>
        <div class="field state-item">
          <span class="label">Energy</span>
          <div id="energy" class="value">Loading...</div>
        </div>
        <div class="field state-item wide">
          <span class="label">Active Thoughts</span>
          <div id="thoughts" class="value">Loading...</div>
        </div>
        <div class="field state-item wide">
          <span class="label">Diary Snapshot</span>
          <div id="diary" class="value">Loading...</div>
        </div>
        <div class="field state-item wide">
          <span class="label">Vision Focus</span>
          <div id="vision" class="value">Loading...</div>
        </div>
      </div>
    </section>
  </main>
</div>

<script src="stats.js"></script>
</body>
</html>

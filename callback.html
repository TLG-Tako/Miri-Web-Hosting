<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miri Login Callback</title>
<style>
body{
margin:0;
min-height:100vh;
display:grid;
place-items:center;
font-family:"Segoe UI",Tahoma,sans-serif;
background:radial-gradient(circle at 0% 0%,#ffffff 0%,#edf3ff 45%,#dfe8ff 100%);
color:#1f2a45;
}
.card{
background:#fff;
border:1px solid #d4e0ff;
border-radius:14px;
padding:20px;
box-shadow:0 14px 34px rgba(38,56,130,0.10);
max-width:460px;
text-align:center;
}
#status{font-weight:600;}
small{display:block;margin-top:8px;color:#6e7692;}
</style>
</head>
<body>
  <div class="card">
    <div id="status">Completing Discord login…</div>
    <small>You’ll be redirected automatically.</small>
  </div>
  <script src="callback.js"></script>
</body>
</html>

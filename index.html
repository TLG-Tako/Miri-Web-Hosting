<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About Miri</title>
<script src="site.js"></script>
<link rel="stylesheet" href="shared.css">
<style>
.about-hero{
display:grid;
grid-template-columns:minmax(0,1.05fr) minmax(280px,.95fr);
gap:18px;
align-items:start;
}

.about-title{
font-size:clamp(34px,6vw,64px);
line-height:1;
margin:0 0 12px;
}

.about-subtitle{
font-size:18px;
line-height:1.45;
color:var(--muted);
margin:0 0 18px;
}

.about-body{
white-space:pre-wrap;
line-height:1.7;
font-size:16px;
overflow-wrap:anywhere;
}

.photo-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px;
}

.photo-grid img{
width:100%;
height:190px;
object-fit:cover;
border-radius:10px;
border:1px solid var(--border);
background:var(--surface-alt);
cursor:zoom-in;
}

.about-details{
margin-top:14px;
}

.about-list{
margin:0;
padding-left:20px;
line-height:1.6;
}

.about-list li{
margin-bottom:6px;
}

.image-modal{
position:fixed;
inset:0;
display:none;
align-items:center;
justify-content:center;
padding:24px;
background:rgba(5,10,22,.82);
z-index:20;
}

.image-modal.is-open{
display:flex;
}

.image-modal img{
max-width:min(1100px,94vw);
max-height:86vh;
object-fit:contain;
border-radius:12px;
box-shadow:0 22px 70px rgba(0,0,0,.35);
}

.image-modal button{
position:absolute;
top:18px;
right:18px;
width:40px;
height:40px;
border-radius:50%;
background:var(--surface);
color:var(--text);
font-size:22px;
}

.empty-photos{
display:grid;
place-items:center;
min-height:260px;
border:1px dashed var(--border);
border-radius:12px;
color:var(--muted);
background:var(--surface-alt);
text-align:center;
padding:18px;
}

@media (max-width:820px){
.about-hero{grid-template-columns:1fr;}
}

@media (max-width:720px){
.about-hero{
gap:12px;
}

.about-title{
font-size:clamp(32px,11vw,44px);
margin-bottom:10px;
}

.about-subtitle{
font-size:16px;
line-height:1.5;
margin-bottom:14px;
}

.about-body{
font-size:15px;
line-height:1.62;
}

.photo-grid{
grid-template-columns:repeat(2,minmax(0,1fr));
gap:8px;
}

.photo-grid img{
height:auto;
aspect-ratio:1/1;
border-radius:8px;
}

.empty-photos{
grid-column:1/-1;
min-height:160px;
border-radius:10px;
}

.about-details{
margin-top:12px;
}

.about-list{
padding-left:18px;
}

.image-modal{
padding:14px;
}

.image-modal img{
max-width:100%;
max-height:82vh;
border-radius:10px;
}

.image-modal button{
top:12px;
right:12px;
}
}

@media (max-width:420px){
.photo-grid{
grid-template-columns:1fr;
}
}
</style>
</head>
<body>
<div class="container">
  <nav class="top-nav">
    <div class="nav-links">
      <a href="/">About</a>
      <a href="/chat.html">Chat</a>
      <a href="/stats.html">Stats</a>
      <a href="/settings.html">Settings</a>
      <a href="/customization.html">Customization</a>
      <a href="/creator.html" data-creator-only>Creator</a>
    </div>
    <div class="identity-row">
      <span data-identity></span>
      <button type="button" data-login-btn>Login</button>
      <button type="button" data-logout-btn>Logout</button>
    </div>
  </nav>

  <main>
    <section class="about-hero">
      <div class="card">
        <h1 id="aboutTitle" class="about-title">About Miri</h1>
        <p id="aboutSubtitle" class="about-subtitle">Loading...</p>
        <div id="aboutBody" class="about-body"></div>
      </div>

      <div class="card">
        <div id="photoGrid" class="photo-grid"></div>
      </div>
    </section>

    <section class="card about-details">
      <h2 id="capabilitiesTitle">What can Miri do?</h2>
      <ul id="capabilitiesList" class="about-list"></ul>

      <h2 id="benefitsTitle">Why choose Miri?</h2>
      <ul id="benefitsList" class="about-list"></ul>
    </section>
  </main>
</div>

<div id="imageModal" class="image-modal" aria-hidden="true">
  <button id="closeImageModal" type="button" aria-label="Close enlarged image">&times;</button>
  <img id="modalImage" alt="">
</div>

<script src="about.js"></script>
</body>
</html>

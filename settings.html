<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miri Settings</title>
<script src="site.js"></script>
<link rel="stylesheet" href="shared.css">
<style>
.settings-card{max-width:820px;}
.setting-row{
display:flex;
align-items:center;
justify-content:space-between;
gap:16px;
padding:8px 0;
}
.setting-title{
font-size:16px;
font-weight:700;
margin-bottom:4px;
}
.theme-toggle{
display:grid;
grid-template-columns:1fr 1fr;
gap:4px;
padding:4px;
border:1px solid var(--border);
border-radius:10px;
background:var(--surface-alt);
min-width:190px;
}
.theme-toggle button{
border:none;
border-radius:7px;
padding:9px 12px;
background:transparent;
color:var(--muted);
cursor:pointer;
font-weight:700;
}
.theme-toggle button[aria-pressed="true"]{
background:var(--primary);
color:white;
}
@media (max-width:620px){
.setting-row{align-items:stretch;flex-direction:column;}
.theme-toggle{width:100%;}
}
</style>
</head>
<body>
<div class="container">
  <nav class="top-nav">
    <div class="nav-links">
      <a href="/">About</a>
      <a href="/chat.html">Chat</a>
      <a href="/stats.html">Stats</a>
      <a href="/settings.html">Settings</a>
      <a href="/customization.html">Customization</a>
      <a href="/creator.html" data-creator-only>Creator</a>
    </div>
    <div class="identity-row">
      <span data-identity></span>
      <button type="button" data-login-btn>Login</button>
      <button type="button" data-logout-btn>Logout</button>
    </div>
  </nav>

  <main>
    <h1>Miri Settings</h1>
    <p class="muted">Adjust how the web dashboard looks on this device.</p>

    <section class="card settings-card">
      <div class="setting-row">
        <div>
          <div class="setting-title">Theme</div>
          <div class="muted">Choose between the light and dark dashboard themes.</div>
        </div>
        <div class="theme-toggle" role="group" aria-label="Theme">
          <button id="lightThemeBtn" type="button">Light</button>
          <button id="darkThemeBtn" type="button">Dark</button>
        </div>
      </div>
    </section>
  </main>
</div>

<script src="settings.js"></script>
</body>
</html>
